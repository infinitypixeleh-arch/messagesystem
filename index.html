<!DOCTYPE html>
<html>
<head>
    <title>School Forum</title>
    <style>
        body {
            font-family: "Segoe UI", Roboto, sans-serif;
            background: #2f3136;
            margin: 0;
            padding: 0 15px;
            color: #e6e6e6;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: #36393f;
            border-radius: 10px;
        }

        input, select, textarea {
            width: 70%;
            max-width: 400px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #202225;
            background: #202225;
            color: #e6e6e6;
            margin-bottom: 8px;
        }

        button {
            background: #5865F2;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #4752c4;
        }

        .search-entry, .inbox-entry {
            background: #2f3136;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .search-entry:hover { border-color: #5865F2; }

        #chatMessages {
            background: #202225;
            height: 250px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .msg-item { margin-bottom: 8px; font-size: 14px; }
        .msg-user { color: #5865F2; font-weight: bold; margin-right: 5px; }

        hr { margin: 20px 0; border: 1px solid #202225; }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <div id="loginSection">
        <input id="usernameInput" placeholder="Username">
        <input id="passwordInput" type="password" placeholder="Password">
        <br>
        <button onclick="submitLogin()">Login</button>
        <button onclick="switchToCreate()">Create Account</button>
        <p id="errorMsg" style="color:#ed4245;"></p>
    </div>

    <div id="appSection" style="display:none;">
        <hr>
        <h3>Start a Discussion</h3>
        <input id="threadTitle" placeholder="Thread Title...">
        <select id="categorySelect">
            <option value="">(No Category)</option>
            <option>General</option>
            <option>Questions</option>
            <option>Help</option>
            <option>News</option>
        </select>
        <br>
        <button onclick="saveThread()">Post Thread</button>
        
        <hr>
        <h3>Find Threads</h3>
        <input id="searchKeyword" placeholder="Search by title, user, or category...">
        <button onclick="searchThreads()">Search</button>
        <div id="searchResults"></div>

        <hr>
        <h3>Recent Threads</h3>
        <div id="threadList"></div>
        <div style="text-align: center; margin-top: 10px;">
            <button id="prevBtn" onclick="changePage(-1)">Prev</button>
            <span id="pageLabel">Page 1</span>
            <button id="nextBtn" onclick="changePage(1)">Next</button>
        </div>

        <hr>
        <h3>My Threads</h3>
        <div id="myThreadsList"></div>

        <div id="chatWindow" style="display:none; margin-top: 20px; padding: 15px; background: #2f3136; border-radius: 8px;">
            <h3 id="chatTitle"></h3>
            <div id="chatMessages"></div>
            <input id="chatInput" style="width: 80%;" placeholder="Write a reply...">
            <button onclick="sendReply()">Reply</button>
            <button onclick="closeChat()" style="background:#4f545c;">Close</button>
        </div>
    </div>
</div>

<div style="text-align:center; padding: 20px;">
    <button id="adminReset" onclick="resetData()" style="background:#ed4245; display:none;">RESET ALL DATA</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXAMTPkmQx4KLydLsEUPPnrI748Exd4Hw",
  authDomain: "seymourbase-a1ad6.firebaseapp.com",
  databaseURL: "https://seymourbase-a1ad6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "seymourbase-a1ad6",
  storageBucket: "seymourbase-a1ad6.firebasestorage.app",
  messagingSenderId: "586609389090",
  appId: "1:586609389090:web:e3bdcc9b3107917818a47b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let authMode = "login";
let activeId = null;
let allThreads = [];
let currentPage = 1;
const perPage = 10;

// Auth Functions
window.switchToCreate = () => { authMode = "create"; document.getElementById("errorMsg").innerText = "Mode: Create Account"; };

window.submitLogin = async () => {
    const u = document.getElementById("usernameInput").value.trim();
    const p = document.getElementById("passwordInput").value.trim();
    if(!u || !p) return;
    const email = `${u.toLowerCase()}@seymour.base`;
    try {
        if(authMode === "create") await createUserWithEmailAndPassword(auth, email, p);
        else await signInWithEmailAndPassword(auth, email, p);
    } catch(e) { document.getElementById("errorMsg").innerText = e.message; }
};

onAuthStateChanged(auth, (user) => {
    if(user) {
        const username = user.email.split('@')[0];
        localStorage.setItem("currentUser", username);
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("appSection").style.display = "block";
        if(username === "infinitypixel") document.getElementById("adminReset").style.display = "inline";
        initSync(username);
    } else {
        document.getElementById("loginSection").style.display = "block";
        document.getElementById("appSection").style.display = "none";
    }
});

// Logic
function initSync(currentUser) {
    onValue(ref(db, 'threads'), (snap) => {
        const data = snap.val();
        if(!data) {
            document.getElementById("threadList").innerHTML = "No threads found.";
            return;
        }
        allThreads = Object.keys(data).map(id => ({ id, ...data[id] })).reverse();
        renderThreads(currentUser);
        renderMyThreads(currentUser);
    });
}

function renderThreads(currentUser) {
    const list = document.getElementById("threadList");
    list.innerHTML = "";
    const start = (currentPage - 1) * perPage;
    const pageItems = allThreads.slice(start, start + perPage);

    pageItems.forEach(t => {
        const lastViewed = localStorage.getItem(`view_${t.id}`) || 0;
        const unread = t.lastActivity > lastViewed;
        const div = document.createElement("div");
        div.className = "search-entry";
        div.innerHTML = `<div>${unread ? '🔵 ' : ''}<strong>${t.title}</strong> <small>(${t.category || 'General'})</small></div>`;
        
        if(currentUser === "infinitypixel") {
            const del = document.createElement("button");
            del.innerText = "Delete";
            del.onclick = (e) => { e.stopPropagation(); remove(ref(db, `threads/${t.id}`)); };
            div.appendChild(del);
        }
        div.onclick = () => openThread(t.id, t.title);
        list.appendChild(div);
    });
    document.getElementById("pageLabel").innerText = `Page ${currentPage}`;
}

function renderMyThreads(currentUser) {
    const myDiv = document.getElementById("myThreadsList");
    myDiv.innerHTML = "";
    allThreads.filter(t => t.user === currentUser).forEach(t => {
        const div = document.createElement("div");
        div.className = "inbox-entry";
        div.innerText = t.title;
        div.onclick = () => openThread(t.id, t.title);
        myDiv.appendChild(div);
    });
}

window.changePage = (dir) => {
    currentPage += dir;
    renderThreads(localStorage.getItem("currentUser"));
};

window.saveThread = () => {
    const title = document.getElementById("threadTitle").value.trim();
    const cat = document.getElementById("categorySelect").value;
    const user = localStorage.getItem("currentUser");
    if(title) {
        push(ref(db, 'threads'), { title, category: cat, user, lastActivity: Date.now() });
        document.getElementById("threadTitle").value = "";
    }
};

window.searchThreads = () => {
    const query = document.getElementById("searchKeyword").value.toLowerCase();
    const results = document.getElementById("searchResults");
    results.innerHTML = "";
    allThreads.filter(t => 
        t.title.toLowerCase().includes(query) || 
        (t.category && t.category.toLowerCase().includes(query)) ||
        t.user.toLowerCase().includes(query)
    ).forEach(t => {
        const d = document.createElement("div");
        d.className = "search-entry";
        d.innerText = `${t.title} [${t.category || 'General'}] by ${t.user}`;
        d.onclick = () => openThread(t.id, t.title);
        results.appendChild(d);
    });
};

window.openThread = (id, title) => {
    activeId = id;
    document.getElementById("chatWindow").style.display = "block";
    document.getElementById("chatTitle").innerText = title;
    localStorage.setItem(`view_${id}`, Date.now());
    
    onValue(ref(db, `replies/${id}`), (snap) => {
        const msgs = document.getElementById("chatMessages");
        msgs.innerHTML = "";
        if(snap.val()) {
            Object.values(snap.val()).forEach(m => {
                const item = document.createElement("div");
                item.className = "msg-item";
                item.innerHTML = `<span class="msg-user">${m.user}:</span> ${m.text}`;
                msgs.appendChild(item);
            });
        }
        msgs.scrollTop = msgs.scrollHeight;
    });
};

window.sendReply = () => {
    const text = document.getElementById("chatInput").value.trim();
    if(!text || !activeId) return;
    const user = localStorage.getItem("currentUser");
    push(ref(db, `replies/${activeId}`), { user, text, time: Date.now() });
    set(ref(db, `threads/${activeId}/lastActivity`), Date.now());
    document.getElementById("chatInput").value = "";
};

window.closeChat = () => document.getElementById("chatWindow").style.display = "none";
window.resetData = () => { if(confirm("Wipe database?")) set(ref(db, '/'), null); };
</script>
</body>
</html>
