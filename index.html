<!DOCTYPE html>
<html>
<head>
    <title>Seymour Base</title>
    <style>
        body {
            font-family: "Segoe UI", Roboto, sans-serif;
            background: #2f3136;
            margin: 0;
            padding: 0 15px;
            color: #e6e6e6;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: #36393f;
            border-radius: 10px;
        }

        input, select, textarea {
            width: 70%;
            max-width: 400px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #202225;
            background: #202225;
            color: #e6e6e6;
            margin-bottom: 8px;
        }

        button {
            background: #5865F2;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #4752c4;
        }

        .search-entry, .inbox-entry {
            background: #2f3136;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .badge {
            background: #ed4245;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 11px;
        }

        #chatMessages {
            background: #202225;
            height: 200px;
            overflow-y: auto;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        hr { margin: 20px 0; border: 1px solid #202225; }
    </style>
</head>
<body>

<div class="container">

<h2>Login</h2>
<div id="loginSection">
    <input id="usernameInput" placeholder="Username">
    <input id="passwordInput" type="password" placeholder="Password">
    <br>
    <button onclick="submitLogin()">Login</button>
    <button onclick="switchToCreate()">Create Account</button>
    <p id="errorMsg" style="color:#ed4245;"></p>
</div>

<div id="appSection" style="display:none;">

<hr>

<h3>Hex Code Input</h3>
<input id="hexInput" placeholder="#123ABC" maxlength="7">
<select id="itemSelect">
    <option value="">Select Item</option>
    <option>Velvet Top Hat</option>
    <option>Cashmere Jacket</option>
    <option>Satin Trousers</option>
    <option>Oxford Shoes</option>
</select>
<br>
<button onclick="saveSearch()">Save</button>
<hr>

<h3>Find a Hex Code</h3>
<input id="lookupHex" placeholder="#123ABC" maxlength="7">
<button onclick="lookupHexCode()">Search</button>

<div id="lookupResults"></div>
<h3>Bulk Import</h3>
<textarea id="bulkImportBox" placeholder="Paste Seymour Export Here..."></textarea>
<br>
<button onclick="bulkImport()">Import</button>

<hr>

<h3>Saved Searches</h3>
<div id="searchList"></div>

<hr>

<h3>Inbox</h3>
    <br>
<button id="resetBtn" onclick="resetAllData()" style="background:#ed4245;">
    RESET ALL DATA (InfinityPixel ONLY)
</button>
<div id="inboxList"></div>

<hr>

<div id="chatWindow" style="display:none;">
    <h3 id="chatTitle"></h3>
    <div id="chatMessages"></div>
    <input id="chatInput" placeholder="Message...">
    <button onclick="sendMessage()">Send</button>
    <button onclick="closeChat()">Close</button>
</div>

</div>
</div>

<script>
let mode = "login";
let currentPage = 1;
const itemsPerPage = 5;
let activeHex = null;
let activeItemName = null;

function switchToCreate(){
    mode = "create";
}

function submitLogin(){
    const user = usernameInput.value.trim();
    const pass = passwordInput.value.trim();
    if(!user || !pass) return;

    let users = JSON.parse(localStorage.getItem("users") || "{}");

    if(mode === "create"){
        if(users[user]) return errorMsg.textContent="User exists";
        users[user]=pass;
        localStorage.setItem("users",JSON.stringify(users));
    }

    if(users[user] !== pass) return errorMsg.textContent="Wrong login";

    localStorage.setItem("currentUser", user);
    loginSuccess();
}

function loginSuccess(){
    loginSection.style.display="none";
    appSection.style.display="block";
    loadSavedSearches();
    loadInbox();
}

function saveSearch(){
    const hex = hexInput.value.trim();
    const item = itemSelect.value;
    const user = localStorage.getItem("currentUser");
    if(hex.length!==7 || !item) return;

    let searches = JSON.parse(localStorage.getItem("savedSearches")||"[]");
    searches.push({user,hex,item});
    localStorage.setItem("savedSearches",JSON.stringify(searches));
    loadSavedSearches();
}

function bulkImport(){
    const raw = bulkImportBox.value.trim();
    const user = localStorage.getItem("currentUser");
    if(!raw) return;

    let searches = JSON.parse(localStorage.getItem("savedSearches")||"[]");
    raw.split("\n").forEach(line=>{
        let parts = line.split("|").map(p=>p.trim());
        if(parts.length>=2){
            let item = parts[0];
            let hex = parts[1];
            if(hex.length===7 && hex.startsWith("#")){
                searches.push({user,hex,item});
            }
        }
    });

    localStorage.setItem("savedSearches",JSON.stringify(searches));
    bulkImportBox.value="";
    loadSavedSearches();
}

function deleteSearch(index){
    let searches = JSON.parse(localStorage.getItem("savedSearches")||"[]");
    searches.splice(index,1);
    localStorage.setItem("savedSearches",JSON.stringify(searches));
    loadSavedSearches();
}

function loadSavedSearches(){
    const list = document.getElementById("searchList");
    list.innerHTML="";
    const user = localStorage.getItem("currentUser");
    let searches = JSON.parse(localStorage.getItem("savedSearches")||"[]");

    searches.forEach((entry,i)=>{
        const div = document.createElement("div");
        div.className="search-entry";

        const left = document.createElement("div");
        left.innerHTML=`<strong>${entry.user}</strong> — ${entry.hex} — ${entry.item}`;

        const right = document.createElement("div");

        // Transfer only by owner
        if(user===entry.user){
            const btn=document.createElement("button");
            btn.textContent="Transfer";
            btn.onclick=(e)=>{
                e.stopPropagation();
                let newOwner=prompt("New owner:");
                if(!newOwner) return;
                searches[i].user=newOwner.trim();
                localStorage.setItem("savedSearches",JSON.stringify(searches));
                loadSavedSearches();
                loadInbox();
            };
            right.appendChild(btn);
        }

        // Delete only InfinityPixel
        if(user==="InfinityPixel"){
            const del=document.createElement("button");
            del.textContent="Delete";
            del.style.marginLeft="6px";
            del.onclick=(e)=>{
                e.stopPropagation();
                deleteSearch(i);
            };
            right.appendChild(del);
        }

        div.appendChild(left);
        div.appendChild(right);
        div.onclick=()=>openChat(entry.hex,entry.item);
        list.appendChild(div);
    });
}

function loadInbox(){
    const inbox=document.getElementById("inboxList");
    inbox.innerHTML="";
    const user=localStorage.getItem("currentUser");
    let searches=JSON.parse(localStorage.getItem("savedSearches")||"[]");

    searches.filter(s=>s.user===user).forEach(entry=>{
        const div=document.createElement("div");
        div.className="inbox-entry";
        div.textContent=`${entry.item} (${entry.hex})`;
        div.onclick=()=>openChat(entry.hex,entry.item);
        inbox.appendChild(div);
    });
}

function openChat(hex,item){
    activeHex=hex;
    activeItemName=item;
    chatWindow.style.display="block";
    chatTitle.textContent=`${item} (${hex})`;
    renderChat();
}

function renderChat(){
    chatMessages.innerHTML="";
    let all=JSON.parse(localStorage.getItem("messages")||"{}");
    let msgs=all[activeHex]||[];
    msgs.forEach(m=>{
        const div=document.createElement("div");
        div.textContent=`${m.user}: ${m.text}`;
        chatMessages.appendChild(div);
    });
}

function sendMessage(){
    const text=chatInput.value.trim();
    if(!text) return;
    let all=JSON.parse(localStorage.getItem("messages")||"{}");
    if(!all[activeHex]) all[activeHex]=[];
    all[activeHex].push({
        user:localStorage.getItem("currentUser"),
        text:text
    });
    localStorage.setItem("messages",JSON.stringify(all));
    chatInput.value="";
    renderChat();
}

function closeChat(){
    chatWindow.style.display="none";
}
    function resetAllData(){
    const user = localStorage.getItem("currentUser");

    if(user !== "InfinityPixel"){
        alert("Only InfinityPixel can reset all data.");
        return;
    }

    if(!confirm("Are you sure? This will permanently delete ALL saved data.")) return;

    localStorage.clear();
    location.reload();
}
    function hexToRgb(hex){
    const bigint = parseInt(hex.slice(1), 16);
    return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
    };
}

function colorDistance(c1, c2){
    return Math.sqrt(
        Math.pow(c1.r - c2.r, 2) +
        Math.pow(c1.g - c2.g, 2) +
        Math.pow(c1.b - c2.b, 2)
    );
}

function lookupHexCode(){
    const input = document.getElementById("lookupHex").value.trim();
    const resultsDiv = document.getElementById("lookupResults");
    resultsDiv.innerHTML = "";

    if(input.length !== 7 || !input.startsWith("#")){
        resultsDiv.textContent = "Invalid hex format.";
        return;
    }

    const searches = JSON.parse(localStorage.getItem("savedSearches") || "[]");
    const inputColor = hexToRgb(input);

    let matches = [];

    searches.forEach(entry => {
        const entryColor = hexToRgb(entry.hex);
        const distance = colorDistance(inputColor, entryColor);

        matches.push({
            entry,
            distance
        });
    });

    // Sort by similarity (smallest distance first)
    matches.sort((a,b)=>a.distance - b.distance);

    if(matches.length === 0){
        resultsDiv.textContent = "No saved hexes.";
        return;
    }

    // Show top 5 closest matches
    matches.slice(0,5).forEach(match=>{
        const div = document.createElement("div");
        div.className = "search-entry";

        div.innerHTML = `
            <strong>${match.entry.user}</strong> —
            ${match.entry.hex} —
            ${match.entry.item}
            (Similarity Score: ${Math.round(match.distance)})
        `;

        resultsDiv.appendChild(div);
    });
}
</script>

</body>
</html>
