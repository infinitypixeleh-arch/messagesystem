<!DOCTYPE html>
<html>
<head>
    <title>Seymour Base</title>
    <style>
        body {
            font-family: "Segoe UI", Roboto, sans-serif;
            background: #2f3136;
            margin: 0;
            padding: 0 15px;
            color: #e6e6e6;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: #36393f;
            border-radius: 10px;
        }

        input, select, textarea {
            width: 70%;
            max-width: 400px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #202225;
            background: #202225;
            color: #e6e6e6;
            margin-bottom: 8px;
        }

        button {
            background: #5865F2;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #4752c4;
        }

        .search-entry, .inbox-entry {
            background: #2f3136;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .badge {
            background: #ed4245;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 11px;
        }

        #chatMessages {
            background: #202225;
            height: 200px;
            overflow-y: auto;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        hr { margin: 20px 0; border: 1px solid #202225; }
    </style>
</head>
<body>

<div class="container">

<h2>Login</h2>
<div id="loginSection">
    <input id="usernameInput" placeholder="Username">
    <input id="passwordInput" type="password" placeholder="Password">
    <br>
    <button onclick="submitLogin()">Login</button>
    <button onclick="switchToCreate()">Create Account</button>
    <p id="errorMsg" style="color:#ed4245;"></p>
</div>

<div id="appSection" style="display:none;">

<hr>

<h3>Hex Code Input</h3>
<input id="hexInput" placeholder="#123ABC" maxlength="7">
<select id="itemSelect">
    <option value="">Select Item</option>
    <option>Velvet Top Hat</option>
    <option>Cashmere Jacket</option>
    <option>Satin Trousers</option>
    <option>Oxford Shoes</option>
</select>
<br>
<button onclick="saveSearch()">Save</button>
<hr>

<h3>Find a Hex Code</h3>
<input id="lookupHex" placeholder="#123ABC" maxlength="7">
<button onclick="lookupHexCode()">Search</button>

<div id="lookupResults"></div>
<h3>Bulk Import</h3>
<textarea id="bulkImportBox" placeholder="Paste Seymour Export Here..."></textarea>
<br>
<button onclick="bulkImport()">Import</button>

<hr>

<h3>Saved Searches</h3>
<div id="searchList"></div>
<div id="paginationControls" style="margin-top: 10px; text-align: center;">
    <button id="prevPage" onclick="changePage(-1)">Previous</button>
    <span id="pageDisplay" style="margin: 0 15px;">Page 1</span>
    <button id="nextPage" onclick="changePage(1)">Next</button>
</div>
<hr>

<h3>Inbox</h3>
    <br>

</button>
<div id="inboxList"></div>

<hr>

<div id="chatWindow" style="display:none;">
    <h3 id="chatTitle"></h3>
    <div id="chatMessages"></div>
    <input id="chatInput" placeholder="Message...">
    <button onclick="sendMessage()">Send</button>
    <button onclick="closeChat()">Close</button>
</div>

</div>
</div>
<button id="resetBtn"
        onclick="resetAllData()"
        style="background:#ed4245; display:none;">
    RESET ALL DATA
</button>
    <button onclick="requestNotificationPermission()">Enable Notifications</button>
<script type="module">
// 1. IMPORT FIREBASE MODULES
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 2. YOUR FIREBASE CONFIGURATION
const firebaseConfig = {
  apiKey: "AIzaSyAXAMTPkmQx4KLydLsEUPPnrI748Exd4Hw",
  authDomain: "seymourbase-a1ad6.firebaseapp.com",
  databaseURL: "https://seymourbase-a1ad6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "seymourbase-a1ad6",
  storageBucket: "seymourbase-a1ad6.firebasestorage.app",
  messagingSenderId: "586609389090",
  appId: "1:586609389090:web:e3bdcc9b3107917818a47b",
  measurementId: "G-W5MQ8XWS6M"
};

// Initialize
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// Global State
let mode = "login";
let activeChatId = null;

// --- AUTH LOGIC ---

window.switchToCreate = function() {
    mode = "create";
    document.getElementById("errorMsg").textContent = "Mode: Create Account";
};

window.submitLogin = async function() {
    const user = document.getElementById("usernameInput").value.trim();
    const pass = document.getElementById("passwordInput").value.trim();
    if(!user || !pass) return;

    const fakeEmail = `${user.toLowerCase()}@seymour.base`;

    try {
        if (mode === "create") {
            await createUserWithEmailAndPassword(auth, fakeEmail, pass);
        } else {
            await signInWithEmailAndPassword(auth, fakeEmail, pass);
        }
    } catch (error) {
        document.getElementById("errorMsg").textContent = "Login failed: " + error.message;
    }
};

onAuthStateChanged(auth, (user) => {
    const loginSection = document.getElementById("loginSection");
    const appSection = document.getElementById("appSection");
    const resetBtn = document.getElementById("resetBtn");

    if (user) {
        const username = user.email.split('@')[0];
        localStorage.setItem("currentUser", username);
        loginSection.style.display = "none";
        appSection.style.display = "block";
        
        if(username.toLowerCase() === "infinitypixel") {
            resetBtn.style.display = "inline-block";
        }
        
        startGlobalSync(username);
    } else {
        loginSection.style.display = "block";
        appSection.style.display = "none";
    }
});

// --- GLOBAL DATA SYNC & PAGINATION ---

let currentPage = 1;
const entriesPerPage = 10;
let totalSearches = []; 

function startGlobalSync(currentUser) {
    const searchList = document.getElementById("searchList");
    const inboxList = document.getElementById("inboxList");

    onValue(ref(db, 'searches'), (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            searchList.innerHTML = "No searches found.";
            inboxList.innerHTML = "";
            return;
        }

        // Convert object to array and reverse to show newest first
        totalSearches = Object.keys(data).map(id => ({
            id: id,
            ...data[id]
        })).reverse(); 

        renderPaginatedList(currentUser);
        
        // Update Personal Inbox
        inboxList.innerHTML = "";
        totalSearches.forEach(entry => {
            if(entry.user === currentUser) {
                const inv = document.createElement("div");
                inv.className = "inbox-entry";
                inv.textContent = `${entry.item} (${entry.hex})`;
                inv.onclick = () => window.openChat(entry.id, entry.hex, entry.item);
                inboxList.appendChild(inv);
            }
        });
    });
}

function renderPaginatedList(currentUser) {
    const searchList = document.getElementById("searchList");
    searchList.innerHTML = "";

    const startIndex = (currentPage - 1) * entriesPerPage;
    const endIndex = startIndex + entriesPerPage;
    const pageItems = totalSearches.slice(startIndex, endIndex);

    pageItems.forEach(entry => {
        const div = document.createElement("div");
        div.className = "search-entry";
        
        // --- UNREAD INDICATOR ---
        const lastViewed = localStorage.getItem(`lastViewed_${entry.id}`) || 0;
        const hasUnread = entry.lastActivity && entry.lastActivity > lastViewed;
        
        div.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div><strong>${entry.user}</strong> — ${entry.hex} — ${entry.item}</div>
                ${hasUnread ? '<span style="color: #ed4245; font-weight: bold; margin-left: 10px;">●</span>' : ''}
            </div>
        `;

        const btns = document.createElement("div");
        
        if(currentUser === entry.user) {
            const trans = document.createElement("button");
            trans.textContent = "Transfer";
            trans.onclick = (e) => {
                e.stopPropagation();
                let nextOwner = prompt("Enter new owner username:").toLowerCase();
                if(nextOwner) set(ref(db, `searches/${entry.id}/user`), nextOwner);
            };
            btns.appendChild(trans);
        }

        if(currentUser.toLowerCase() === "infinitypixel") {
            const del = document.createElement("button");
            del.textContent = "Delete";
            del.style.marginLeft = "5px";
            del.onclick = (e) => { e.stopPropagation(); remove(ref(db, `searches/${entry.id}`)); };
            btns.appendChild(del);
        }
        
        div.appendChild(btns);
        
        // --- CLICKING UPDATES "READ" STATUS ---
        div.onclick = () => {
            localStorage.setItem(`lastViewed_${entry.id}`, Date.now());
            window.openChat(entry.id, entry.hex, entry.item);
        };
        
        searchList.appendChild(div);
    });

    document.getElementById("pageDisplay").textContent = `Page ${currentPage}`;
    document.getElementById("prevPage").disabled = (currentPage === 1);
    document.getElementById("nextPage").disabled = (endIndex >= totalSearches.length);
}

window.changePage = function(direction) {
    currentPage += direction;
    const currentUser = localStorage.getItem("currentUser");
    renderPaginatedList(currentUser);
};

// --- DATA MANAGEMENT ---

window.saveSearch = function() {
    const hex = document.getElementById("hexInput").value.trim();
    const item = document.getElementById("itemSelect").value;
    const user = localStorage.getItem("currentUser");
    if(hex.length === 7 && item) {
        push(ref(db, 'searches'), { user, hex, item, timestamp: Date.now() });
    }
};

window.bulkImport = function() {
    const raw = document.getElementById("bulkImportBox").value.trim();
    if(!raw) return;

    raw.split("\n").forEach(line => {
        let parts = line.split("|").map(p => p.trim());
        if(parts.length >= 2) {
            let item = parts[0];
            let hex = parts[1];
            if(hex.length === 7 && hex.startsWith("#")) {
                push(ref(db, 'searches'), { user: localStorage.getItem("currentUser"), hex, item });
            }
        }
    });
    document.getElementById("bulkImportBox").value = "";
};

// --- COLOR SEARCH LOGIC ---

function hexToRgb(hex) {
    const bigint = parseInt(hex.slice(1), 16);
    return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
}

function colorDistance(c1, c2) {
    return Math.sqrt(Math.pow(c1.r-c2.r,2) + Math.pow(c1.g-c2.g,2) + Math.pow(c1.b-c2.b,2));
}

window.lookupHexCode = function() {
    const input = document.getElementById("lookupHex").value.trim();
    const resultsDiv = document.getElementById("lookupResults");
    resultsDiv.innerHTML = "";

    if(input.length !== 7 || !input.startsWith("#")) return;

    const inputColor = hexToRgb(input);

    onValue(ref(db, 'searches'), (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        let matches = [];
        Object.keys(data).forEach(id => {
            const entry = data[id];
            const dist = colorDistance(inputColor, hexToRgb(entry.hex));
            matches.push({ entry, dist, id });
        });

        matches.sort((a,b) => a.dist - b.dist);
        matches.slice(0,5).forEach(m => {
            const resDiv = document.createElement("div");
            resDiv.className = "search-entry";
            resDiv.innerHTML = `<strong>${m.entry.user}</strong> — ${m.entry.hex} — ${m.entry.item} (Similarity Score: ${Math.round(m.dist)})`;
            resDiv.onclick = () => window.openChat(m.id, m.entry.hex, m.entry.item);
            resultsDiv.appendChild(resDiv);
        });
    }, { onlyOnce: true });
};

// --- REAL-TIME CHAT LOGIC ---

window.openChat = function(id, hex, item) {
    activeChatId = id;
    document.getElementById("chatWindow").style.display = "block";
    document.getElementById("chatTitle").textContent = `${item} (${hex})`;
    
    // Mark as read when opened
    localStorage.setItem(`lastViewed_${id}`, Date.now());
    
    const msgDiv = document.getElementById("chatMessages");
    
    // Track if this is the first load to avoid notifying about old messages
    let isFirstLoad = true;

    onValue(ref(db, `messages/${id}`), (snapshot) => {
        msgDiv.innerHTML = "";
        const msgs = snapshot.val();
        
        if(msgs) {
            const msgsArray = Object.values(msgs);
            
            msgsArray.forEach(m => {
                const d = document.createElement("div");
                d.textContent = `${m.user}: ${m.text}`;
                msgDiv.appendChild(d);
            });

            // If not the first load, and the new message isn't from me, notify
            if(!isFirstLoad && msgsArray[msgsArray.length-1].user !== localStorage.getItem("currentUser")) {
                const lastMsg = msgsArray[msgsArray.length-1];
                showNotification(item, hex, lastMsg.user, lastMsg.text);
            }
        }
        
        isFirstLoad = false;
        msgDiv.scrollTop = msgDiv.scrollHeight;
    });
};

window.sendMessage = function() {
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if(!text || !activeChatId) return;

    const currentUser = localStorage.getItem("currentUser");

    // 1. Send the message
    push(ref(db, `messages/${activeChatId}`), {
        user: currentUser,
        text: text,
        timestamp: Date.now()
    });
    
    // 2. Mark this search as "unread" for everyone else
    const searchRef = ref(db, `searches/${activeChatId}`);
    onValue(searchRef, (snapshot) => {
        const searchData = snapshot.val();
        if(searchData) {
            // We just update the lastActivity so the unread indicator knows to trigger
            set(ref(db, `searches/${activeChatId}/lastActivity`), Date.now());
        }
    }, { onlyOnce: true });

    input.value = "";
};

window.closeChat = () => document.getElementById("chatWindow").style.display = "none";

window.resetAllData = function() {
    if(confirm("DANGER: This deletes the entire global database. Continue?")) {
        set(ref(db, '/'), null);
    }
};

// --- NOTIFICATION LOGIC ---

window.requestNotificationPermission = function() {
    if ("Notification" in window) {
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                alert("Notifications enabled!");
            }
        });
    }
};

function showNotification(item, hex, messageUser, text) {
    if ("Notification" in window && Notification.permission === "granted") {
        new Notification(`New message in ${item} (${hex})`, {
            body: `${messageUser}: ${text}`,
            icon: 'https://firebase.google.com/downloads/brand-guidelines/PNG/logo-standard.png' // Optional icon
        });
    }
}
</script>
</body>
</html>
