<!DOCTYPE html>
<html>
<head>
    <title>Seymour Base</title>
    <style>
        /* ---------- Discord Dark Theme ---------- */
        body {
            font-family: "Segoe UI", Roboto, sans-serif;
            background: #2f3136;
            margin: 0;
            padding: 0 15px;
            color: #e6e6e6;
        }

        h1, h2, h3 {
            color: #ffffff;
        }

        hr {
            border: none;
            border-top: 1px solid #202225;
            margin: 20px 0;
        }

        /* ---------- Layout ---------- */
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: #36393f;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        /* ---------- Inputs ---------- */
        input[type="text"],
        input[type="password"],
        input[type="search"],
        select {
            width: 70%;
            max-width: 350px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #202225;
            background: #202225;
            color: #e6e6e6;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus,
        select:focus {
            border-color: #5865F2;
            box-shadow: 0 0 0 2px rgba(88,101,242,0.4);
            outline: none;
        }

        select {
            appearance: none;
            cursor: pointer;
            background-image: url("data:image/svg+xml;utf8,<svg fill='lightgray' height='20' width='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'><polygon points='0,0 20,0 10,12'/></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 14px;
        }

        /* ---------- Buttons ---------- */
        button {
            background: #5865F2;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, transform 0.05s;
        }

        button:hover {
            background: #4752c4;
        }

        button:active {
            transform: scale(0.97);
        }

        #adminResetBtn {
            background: #ed4245;
        }

        #adminResetBtn:hover {
            background: #c03538;
        }

        /* ---------- Saved Search List ---------- */
        #searchList > .search-entry {
            background: #2f3136;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid #5865F2;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        #searchList > .search-entry:hover {
            background: #3a3d43;
        }

        .entry-main {
            flex: 1;
        }

        .badge {
            background: #ed4245;
            color: white;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 11px;
            margin-left: 8px;
        }

        /* ---------- Pagination ---------- */
        .pagination {
            margin-top: 10px;
            display: flex;
            align-items: center;
        }

        .pagination button {
            background: #202225;
            border: 1px solid #3a3d43;
            font-size: 12px;
        }

        .pagination button:hover {
            background: #3a3d43;
        }

        .pagination span {
            font-size: 12px;
            margin: 0 8px;
            color: #b9bbbe;
        }

        /* ---------- Inbox ---------- */
        #inboxList .inbox-entry {
            background: #2f3136;
            padding: 8px 10px;
            border-radius: 6px;
            margin-bottom: 6px;
            border-left: 3px solid #5865F2;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #inboxList .inbox-entry.no-messages {
            border-left-color: #4f545c;
        }

        #inboxList .inbox-entry:hover {
            background: #3a3d43;
        }

        /* ---------- Chat Window (Discord Compact Style) ---------- */
        #chatWindow {
            background: #2f3136;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #202225;
        }

        #chatTitle {
            font-size: 14px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        #chatMessages {
            height: 220px;
            overflow-y: auto;
            background: #202225;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
        }

        .chat-line {
            margin-bottom: 4px;
            color: #dcddde;
        }

        .chat-username {
            font-weight: 600;
            color: #ffffff;
        }

        .chat-time {
            font-size: 11px;
            color: #72767d;
            margin-left: 4px;
        }

        .chat-text {
            margin-left: 4px;
        }

        #chatInput {
            width: 75%;
            max-width: 500px;
            margin-top: 8px;
            margin-right: 6px;
        }

        /* ---------- Notification Toast ---------- */
        #notificationToast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            background: #202225;
            color: #ffffff;
            padding: 10px 14px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.6);
            display: none;
            min-width: 220px;
            max-width: 320px;
            font-size: 13px;
            border-left: 3px solid #5865F2;
            z-index: 9999;
        }

        #notificationToast-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        #notificationToast-body {
            color: #dcddde;
        }

        /* ---------- Misc ---------- */
        .row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .row > div {
            flex: 1;
            min-width: 200px;
        }

        #errorMsg {
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Seymour Logger</h1>

    <h2 id="loginTitle">Account Login</h2>

    <div id="loginSetup">
        <input id="usernameInput" type="text" placeholder="Username">
        <br><br>
        <input id="passwordInput" type="password" placeholder="Password">
        <br><br>
        <button onclick="submitLogin()">Continue</button>
        <button onclick="switchToCreate()">Create New Account</button>
        <p id="errorMsg" style="color:#ed4245;"></p>
    </div>

    <hr>

    <div id="searchSection" style="display:none;">

        <h3>Hex Code Search</h3>

        <input id="hexInput" type="text" placeholder="Hex Code (7 chars)" maxlength="7">
        <select id="itemSelect">
            <option value="">Select Item</option>
            <option value="Velvet Top Hat">Velvet Top Hat</option>
            <option value="Cashmere Jacket">Cashmere Jacket</option>
            <option value="Satin Trousers">Satin Trousers</option>
            <option value="Oxford Shoes">Oxford Shoes</option>
        </select>
        <button onclick="saveSearch()">Save</button>

        <h3>Saved Searches</h3>
        <div id="searchList"></div>

        <hr>

        <h3>Find a Hex Code (does not save)</h3>
        <input id="lookupHex" type="text" placeholder="Enter Hex Code (7 chars)" maxlength="7">
        <button onclick="lookupHexCode()">Search</button>

        <p id="lookupResult"></p>

        <hr>

        <button id="adminResetBtn" style="display:none;" onclick="resetAllData()">
            RESET ALL DATA (ADMIN ONLY)
        </button>

        <!-- Chat Window -->
        <div id="chatWindow" style="display:none;">
            <h3 id="chatTitle"></h3>
            <div id="chatMessages"></div>

            <input id="chatInput" type="text" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
            <button onclick="closeChat()" style="background:#4f545c; margin-left:6px;">Close</button>
        </div>

        <hr>

        <h3>Your Items With Messages</h3>
        <div id="inboxList"></div>

    </div>
</div>

<!-- Notification Toast -->
<div id="notificationToast">
    <div id="notificationToast-title"></div>
    <div id="notificationToast-body"></div>
</div>

<script>
    let mode = "login"; // "login" or "create"
    let currentPage = 1;
    const itemsPerPage = 5;
    let activeHex = null;
    let activeItemName = null;

    // ---------- On load ----------
    window.onload = function() {
        const savedUser = localStorage.getItem("savedUser");
        const savedPass = localStorage.getItem("savedPass");

        if (savedUser && savedPass) {
            mode = "login";
            document.getElementById("loginTitle").textContent = "Account Login";
        } else {
            mode = "create";
            document.getElementById("loginTitle").textContent = "Create Account";
        }
    };

    // ---------- Auth ----------
    function switchToCreate() {
        mode = "create";
        document.getElementById("loginTitle").textContent = "Create Account";
        document.getElementById("errorMsg").textContent = "";
        document.getElementById("usernameInput").value = "";
        document.getElementById("passwordInput").value = "";
    }

    function submitLogin() {
        const user = document.getElementById("usernameInput").value.trim();
        const pass = document.getElementById("passwordInput").value.trim();
        const error = document.getElementById("errorMsg");

        if (user === "" || pass === "") {
            error.textContent = "Username and password cannot be empty.";
            return;
        }

        let allUsers = JSON.parse(localStorage.getItem("allUsers") || "[]");

        if (mode === "create") {
            if (allUsers.includes(user)) {
                error.textContent = "This username already exists.";
                return;
            }

            allUsers.push(user);
            localStorage.setItem("allUsers", JSON.stringify(allUsers));

            localStorage.setItem("savedUser", user);
            localStorage.setItem("savedPass", pass);

            loginSuccess();
            return;
        }

        if (mode === "login") {
            const savedUser = localStorage.getItem("savedUser");
            const savedPass = localStorage.getItem("savedPass");

            if (user === savedUser && pass === savedPass) {
                loginSuccess();
            } else {
                error.textContent = "Incorrect username or password.";
            }
        }
    }

    function loginSuccess() {
        document.getElementById("loginSetup").style.display = "none";
        document.getElementById("searchSection").style.display = "block";

        const user = localStorage.getItem("savedUser");
        if (user === "admintest") {
            document.getElementById("adminResetBtn").style.display = "inline-block";
        }

        loadSavedSearches();
        loadInbox();
    }

    // ---------- Saved Searches ----------
    function saveSearch() {
        const hex = document.getElementById("hexInput").value.trim();
        const item = document.getElementById("itemSelect").value;
        const user = localStorage.getItem("savedUser");

        if (hex === "" || item === "") return;
        if (hex.length !== 7) return;

        let searches = JSON.parse(localStorage.getItem("savedSearches") || "[]");
        searches.push({ user: user, hex: hex, item: item });
        localStorage.setItem("savedSearches", JSON.stringify(searches));

        loadSavedSearches();
        loadInbox();

        document.getElementById("hexInput").value = "";
        document.getElementById("itemSelect").value = "";
    }

    function loadSavedSearches() {
        const list = document.getElementById("searchList");
        list.innerHTML = "";

        let searches = JSON.parse(localStorage.getItem("savedSearches") || "[]");
        let messages = JSON.parse(localStorage.getItem("savedMessages") || "[]");
        const user = localStorage.getItem("savedUser");

        const totalItems = searches.length;
        const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;

        if (currentPage > totalPages) currentPage = totalPages;

        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = searches.slice(start, end);

        pageItems.forEach(entry => {
            const div = document.createElement("div");
            div.className = "search-entry";

            const main = document.createElement("div");
            main.className = "entry-main";
            main.textContent = `${entry.user} — ${entry.hex} — ${entry.item}`;

            const badgeContainer = document.createElement("div");

            const unreadCount = countUnreadForUser(entry.hex, user, messages);
            if (unreadCount > 0) {
                const badge = document.createElement("span");
                badge.className = "badge";
                badge.textContent = unreadCount;
                badgeContainer.appendChild(badge);
            }

            div.appendChild(main);
            div.appendChild(badgeContainer);

            div.onclick = () => openChat(entry.hex, entry.item);

            list.appendChild(div);
        });

        const nav = document.createElement("div");
        nav.className = "pagination";

        const totalPagesCalc = Math.ceil(totalItems / itemsPerPage) || 1;

        const prevBtn = document.createElement("button");
        prevBtn.textContent = "Previous";
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = () => {
            currentPage--;
            loadSavedSearches();
        };

        const nextBtn = document.createElement("button");
        nextBtn.textContent = "Next";
        nextBtn.disabled = currentPage === totalPagesCalc;
        nextBtn.onclick = () => {
            currentPage++;
            loadSavedSearches();
        };

        const label = document.createElement("span");
        label.textContent = `Page ${currentPage} of ${totalPagesCalc}`;

        nav.appendChild(prevBtn);
        nav.appendChild(label);
        nav.appendChild(nextBtn);

        list.appendChild(nav);
    }

    // ---------- Messages Storage ----------
    function getMessages(hex) {
        let all = JSON.parse(localStorage.getItem("savedMessages") || "[]");
        return all.find(m => m.hex === hex) || { hex: hex, messages: [] };
    }

    function saveMessages(hex, messages) {
        let all = JSON.parse(localStorage.getItem("savedMessages") || "[]");
        let existing = all.find(m => m.hex === hex);

        if (existing) {
            existing.messages = messages;
        } else {
            all.push({ hex: hex, messages: messages });
        }

        localStorage.setItem("savedMessages", JSON.stringify(all));
    }

    function countUnreadForUser(hex, user, allMessages) {
        const data = allMessages.find(m => m.hex === hex);
        if (!data) return 0;
        let count = 0;
        data.messages.forEach(msg => {
            if (msg.sender !== user) {
                if (!msg.readBy || !msg.readBy.includes(user)) {
                    count++;
                }
            }
        });
        return count;
    }

    function markMessagesRead(hex, user) {
        let all = JSON.parse(localStorage.getItem("savedMessages") || "[]");
        let data = all.find(m => m.hex === hex);
        if (!data) return;

        let changed = false;
        data.messages.forEach(msg => {
            if (msg.sender !== user) {
                if (!msg.readBy) msg.readBy = [];
                if (!msg.readBy.includes(user)) {
                    msg.readBy.push(user);
                    changed = true;
                }
            }
        });

        if (changed) {
            localStorage.setItem("savedMessages", JSON.stringify(all));
        }
    }

    // ---------- Chat ----------
    function openChat(hex, itemName) {
        activeHex = hex;
        activeItemName = itemName;

        document.getElementById("chatWindow").style.display = "block";
        document.getElementById("chatTitle").textContent = `${itemName} (${hex})`;

        renderChat();
        const user = localStorage.getItem("savedUser");
        markMessagesRead(hex, user);
        loadSavedSearches();
        loadInbox();
    }

    function renderChat() {
        const chatBox = document.getElementById("chatMessages");
        chatBox.innerHTML = "";

        if (!activeHex) return;

        let data = getMessages(activeHex);

        data.messages.forEach(msg => {
            const line = document.createElement("div");
            line.className = "chat-line";

            const userSpan = document.createElement("span");
            userSpan.className = "chat-username";
            userSpan.textContent = msg.sender;

            const timeSpan = document.createElement("span");
            timeSpan.className = "chat-time";
            timeSpan.textContent = formatTime(msg.time);

            const textSpan = document.createElement("span");
            textSpan.className = "chat-text";
            textSpan.textContent = "— " + msg.text;

            line.appendChild(userSpan);
            line.appendChild(timeSpan);
            line.appendChild(textSpan);

            chatBox.appendChild(line);
        });

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
        if (!activeHex) return;

        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text) return;

        const user = localStorage.getItem("savedUser");
        let data = getMessages(activeHex);

        data.messages.push({
            sender: user,
            text: text,
            time: Date.now(),
            readBy: [user]
        });

        saveMessages(activeHex, data.messages);
        input.value = "";

        renderChat();
        loadSavedSearches();
        loadInbox();

        showNotification(`Message on ${activeItemName}`, `${user}: ${text}`);
    }

    function closeChat() {
        document.getElementById("chatWindow").style.display = "none";
        activeHex = null;
        activeItemName = null;
    }

    function formatTime(ts) {
        const d = new Date(ts);
        const h = d.getHours().toString().padStart(2, "0");
        const m = d.getMinutes().toString().padStart(2, "0");
        return `${h}:${m}`;
    }

    // ---------- Inbox ----------
    function loadInbox() {
        const inbox = document.getElementById("inboxList");
        inbox.innerHTML = "";

        const user = localStorage.getItem("savedUser");
        let searches = JSON.parse(localStorage.getItem("savedSearches") || "[]");
        let messages = JSON.parse(localStorage.getItem("savedMessages") || "[]");

        searches
            .filter(s => s.user === user)
            .forEach(entry => {
                const msgData = messages.find(m => m.hex === entry.hex);
                const hasMessages = msgData && msgData.messages.length > 0;
                const unreadCount = countUnreadForUser(entry.hex, user, messages);

                const div = document.createElement("div");
                div.className = "inbox-entry";
                if (!hasMessages) div.classList.add("no-messages");

                const label = document.createElement("span");
                label.textContent = `${entry.item} (${entry.hex})`;

                const right = document.createElement("div");
                if (unreadCount > 0) {
                    const badge = document.createElement("span");
                    badge.className = "badge";
                    badge.textContent = unreadCount;
                    right.appendChild(badge);
                } else if (hasMessages) {
                    const badge = document.createElement("span");
                    badge.style.fontSize = "11px";
                    badge.style.color = "#b9bbbe";
                    badge.textContent = "Read";
                    right.appendChild(badge);
                }

                div.appendChild(label);
                div.appendChild(right);

                div.onclick = () => openChat(entry.hex, entry.item);

                inbox.appendChild(div);
            });
    }

    // ---------- Lookup ----------
    function lookupHexCode() {
        const code = document.getElementById("lookupHex").value.trim();
        const result = document.getElementById("lookupResult");

        if (code.length !== 7) {
            result.textContent = "Hex Code must be exactly 7 characters.";
            return;
        }

        let searches = JSON.parse(localStorage.getItem("savedSearches") || "[]");
        const match = searches.find(entry => entry.hex === code);

        if (match) {
            result.textContent = "Found: " + match.user + " — " + match.hex + " — " + match.item;
        } else {
            result.textContent = "No saved entry found for this Hex Code.";
        }
    }

    // ---------- Admin reset ----------
    function resetAllData() {
        if (!confirm("Are you sure? This will delete ALL data.")) return;

        localStorage.clear();
        location.reload();
    }

    // ---------- Notification Toast ----------
    let toastTimeout = null;

    function showNotification(title, body) {
        const toast = document.getElementById("notificationToast");
        const tTitle = document.getElementById("notificationToast-title");
        const tBody = document.getElementById("notificationToast-body");

        tTitle.textContent = title;
        tBody.textContent = body;

        toast.style.display = "block";
        toast.style.opacity = "1";
        toast.style.transform = "translateY(0)";

        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.style.opacity = "0";
            setTimeout(() => {
                toast.style.display = "none";
            }, 300);
        }, 2500);
    }
</script>
</body>
</html>
